<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>before after</title>
    <style>
        .one::before {
            content: "📞";
            margin-right: 8px;
        }

        div::after {
            content: "*";
            color: red;
            font-size: 36px;
            font-weight: bold;
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="one">
        <span>文字前面的电话是before效果</span>
    </div>
    <div>
        <span>文字后面的*是after效果</span>
    </div>
</body>

</html>
