<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>伪类选择器的应用</title>
    <style>
        input {
            width: 150px;
            background-color: pink;
            margin: 10px;
        }

        input[type=button] {
            width: 120px;
            background-color: skyblue;
        }

        input:focus {
            background-color: yellow;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>添加表单样式</h1>
    <form name="input" action="" method="get">
        姓名:<input type="text" name="Name" value="张三" size="20"><br>
        密码:<input type="password" name="mima" size="20"><br>
        <input type="button" value="提交信息">
    </form>
</body>

</html>
