<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>nth-of-type</title>
    <style>
        p:nth-of-type(2) {
            background: red;
        }
    </style>
</head>

<body>
    <h1>这是标题1</h1>
    <p>第一个段落。</p>
    <h2>这是标题2</h2>
    <p>第二个段落。</p>
    <p>第三个段落。</p>
    <p>第四个段落。</p>
    <p>第五个段落。</p>
</body>

</html>
