<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>属性选择器的应用01</title>
    <style>
        a {
            display: block;
            width: 600px;
            height: 30px;
            margin: 10px auto;
            text-align: center;
            text-decoration: none;
            border: 1px solid #000;
        }

        a[target] {
            background-color: skyblue;
        }

        a[target="_blank"] {
            background-color: yellow;
        }
    </style>
</head>

<body>
    <a href="#1">超链接1，没有target属性</a>
    <a href="#2" target="_blank">超链接2，有target属性，属性值为_blank</a>
    <a href="#3" target="_top">超链接3，有target属性，属性值为_top</a>
</body>

</html>
