<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>first-letter</title>
    <style>
        h1,
        p {
            width: 500px;
            height: 100px;
            line-height: 100px;
            border: 1px solid #000;
            text-align: center;
            margin: 10px auto;
        }

        h1::first-letter {
            font-size: 200%;
            color: red;
        }

        p::first-letter {
            font-size: 200%;
            color: blue;
        }
    </style>
</head>

<body>
    <h1>欢迎你来到河南科技大学</h1>
    <p>软件学院欢迎您</p>
    <p>开启四年美好生活</p>
</body>

</html>
