<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>左右底部居中</title>
    <style>
        .box{
            width:500px;
            height:300px;
            border:1px solid red;
            margin:10px auto;
            position:relative;
        }
        .sonlt-v{
            position:absolute;
            left:0;
            top:50%;
            margin-top:-25px;
            width:80px;
            height:50px;
            background:#ccc;
            text-align:center;
            line-height:50px;
        }
        .sonrt-v{
            position:absolute;
            right:0;
            top:50%;
            margin-top:-25px;
            width:80px;
            height:50px;
            background:#ccc;
            text-align:center;
            line-height:50px;
        }
        .sonbt-c{
            position:absolute;
            bottom:0;
            left:50%;
            margin-left:-25px;
            width:50px;
            height:30px;
            background:#ccc;
            text-align:center;
            line-height:30px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="sonlt-v">左侧垂直居中</div>
        <div class="sonrt-v">右侧垂直居中</div>
        <div class="sonbt-c">底部水平居中</div>
    </div>
</body>
</html>
