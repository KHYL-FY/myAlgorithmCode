<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>子绝父相水平垂直居中</title>
    <style>
        .father{
            width:400px;
            height:300px;
            background-color:pink;
            position:relative;
            margin:50px auto;
        }
        .son{
            width:200px;
            height:100px;
            background-color:blue;
            position:absolute;
            left:50%;
            top:50%;
            margin-left:-100px;
            margin-top:-50px;
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="son"></div>
    </div>
</body>
</html>
