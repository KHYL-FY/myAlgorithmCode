<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子绝父相</title>
    <style>
        .grandpa{
            width: 500px;
            height: 300px;
            background-color: pink;
            /*position: relative;*/
            margin: 50px auto;
        }
        .father{
            width: 300px;
            height: 200px;
            background-color: skyblue;
            /*position: relative;*/
        }
        .son{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div class="grandpa">
        <div class="father">
            <div class="son"></div>
        </div>
    </div>
</body>
</html>
