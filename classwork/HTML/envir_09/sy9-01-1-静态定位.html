<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>静态定位</title>
    <style>
        div {
            width: 300px;
            height: 300px;
        }
        .red { background-color: red; }
        .blue { background-color: blue; }
        .green {
            /* 静态定位 默认值 */
            position: static;
            top: 100px;
            left: 100px;
            background-color: green;
            /* 静态定位偏移无效 */
        }
    </style>
</head>
<body>
    <div class="red"></div>
    <div class="green"></div>
    <div class="blue"></div>
</body>
</html>
