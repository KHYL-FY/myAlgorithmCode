<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>固定定位</title>
    <style>
        body{
            height:2000px;
            border:1px solid #000;
        }
        .nav{
            width:100%;
            height:100px;
            background:#06f;
            color:#fff;
            text-align:center;
            line-height:100px;
            position:fixed;
            top:0;
            left:0;
        }
        .college{ margin-top:120px; }
        .college div{
            font-size:20px;
            line-height:40px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="nav">导航栏</div>
    <div class="college">
        <div>软件学院</div>
        <div>信工学院</div>
        <div>车动学院</div>
        <div>机电学院</div>
        <div>医学院</div>
        <div>农学院</div>
    </div>
</body>
</html>
