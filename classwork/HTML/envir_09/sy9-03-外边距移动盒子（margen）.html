<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>外边距移动盒子</title>
    <style>
        *{padding:0; margin:0;}
        .father{
            width: 912px;
            height: 200px;
            border:2px red solid;
            background-color: rgb(215,220,221);
            margin: auto;
        }
        .son{
            width:300px;
            height:100px;
            background-color: #CC9;
            border:2px blue dashed;
            text-align:center;
            line-height:100px;
            font-size:24px;
            float:left;
        }
        .son2{
            width:300px;
            height:100px;
            background-color: rgb(234,40,40);
            float:left;
            margin-left: -150px;
            margin-top: -10px;
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="son">软件学院</div>
        <div class="son2">机电学院</div>
    </div>
</body>
</html>
