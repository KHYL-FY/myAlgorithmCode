<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>盒子层级 z-index</title>
    <style>
        div{
            width:300px;
            height:300px;
            position:absolute;
        }
        .red{
            background-color:red;
            top:0; left:0;
            z-index:999;
        }
        .green{
            background-color:green;
            top:50px; left:50px;
            z-index:100;
        }
        .blue{
            background-color:blue;
            top:100px; left:100px;
            z-index:5;
        }
    </style>
</head>
<body>
    <div class="red"></div>
    <div class="green"></div>
    <div class="blue"></div>
</body>
</html>
