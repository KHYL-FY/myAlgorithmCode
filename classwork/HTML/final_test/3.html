<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>
    <style>
        /*补全代码*/
        .box {
            /* 尺寸 */
            width: 400px;
             height: 150px;

            /* 水平居中 + 上下外边距 20px */
            margin: 20px auto;

            /* 文字样式 */
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            line-height: 150px;          /* 垂直居中（内容区高度） */

            /* 边框与圆角 */
            border: 20px solid red;
            border-radius: 10%;

            /* 内边距 */
            padding: 30px;

            /* 背景色 */
            background-color: #CCC;
        }
    </style>
</head>
<body>
    <div class="box">千里之行，始于足下</div>
</body>
</html>
