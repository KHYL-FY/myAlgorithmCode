<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>兄弟选择器</title>
    <style>
        p+h2 {
            color: #0FF;
            font-family: "宋体";
            font-size: 40px;
        }

        p~h2 {
            color: pink;
            font-family: "微软雅黑";
            font-size: 30px;
        }
    </style>
</head>

<body>
    <h2>《赠汪伦》</h2>
    <p>李白乘舟将欲行，</p>
    <h2>忽闻岸上踏歌声。</h2>
    <h2>桃花潭水深千尺，</h2>
    <h2>不及汪伦送我情。</h2>
</body>

</html>
