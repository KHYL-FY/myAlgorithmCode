<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>交集选择器</title>
    <style>
        h1.green {
            color: green;
        }

        h1#yellow {
            color: purple;
            font-size: 14px;
        }

        p.green {
            color: pink;
        }

        #yellow.green {
            color: skyblue;
        }
    </style>
</head>

<body>
    <h1>唐诗欣赏</h1>
    <h1 class="green">春晓</h1>
    <h1 id="yellow" class="green">唐 孟浩然</h1>
    <p class="green">春眠不觉晓，处处闻啼鸟。</p>
    <p>夜来风雨声，花落知多少。</p>
</body>

</html>
