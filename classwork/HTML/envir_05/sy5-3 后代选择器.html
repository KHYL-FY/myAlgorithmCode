<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>后代选择器</title>
    <style>
        p {
            color: #00F;
        }

        strong {
            color: #F0F;
        }

        p strong {
            color: green;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <p><strong>长相思</strong></p>
    <strong>(清)纳兰性德</strong>
    <p>山一程，水一程，身向榆关那畔行，夜深千帐灯。</p>
    <p><span><strong>风一更，</strong></span>雪一更，聒碎乡心梦不成，故园无此声。</p>
</body>

</html>
