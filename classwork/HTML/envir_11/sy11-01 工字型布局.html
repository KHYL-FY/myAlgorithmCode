<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>工字型布局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .header {
            width: 100%;
            height: 200px;
            background: #ccc;
            margin-bottom: 8px;
        }

        .nav {
            width: 900px;
            height: 100px;
            background: #666;
            margin: 0 auto 8px;
        }

        .container {
            width: 900px;
            margin: 0 auto 8px;
            display: flex;
            gap: 8px;
        }

        .left {
            width: 200px;
            height: 300px;
            background: #999;
        }

        .right {
            width: 692px;
            height: 300px;
            background: #999;
        }

        .footer {
            width: 100%;
            height: 100px;
            background: #333;
            color: #fff;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>

<body>
    <div class="header">头部</div>
    <div class="nav">导航</div>
    <div class="container">
        <div class="left">左侧</div>
        <div class="right">右侧</div>
    </div>
    <div class="footer">页脚</div>
</body>

</html>
