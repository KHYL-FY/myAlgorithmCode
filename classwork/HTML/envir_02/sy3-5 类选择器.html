<!DOCTYPE html>
<html lang="utf-8">

<head>
    <meta charset="utf-8">
    <title>类选择器</title>
    <style>
        .green {
            color: green;
            text-decoration: underline;
        }

        .red {
            color: red;
        }

        .font22 {
            font-size: 22px;
        }

        p {
            text-decoration: underline;
            font-family: "微软雅黑";
            color: #00f;
        }
    </style>
</head>

<body>
    <p>志南</p>
    <h2 class="red">绝句·古木阴中系短篷</h2>
    <p class="green font22">古木阴中系短篷，杖藜扶我过桥东。</p>
    <p class="red font22">沾衣欲湿杏花雨，吹面不寒杨柳风。</p>
</body>

</html>
