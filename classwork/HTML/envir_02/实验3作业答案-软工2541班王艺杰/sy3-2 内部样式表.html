<!DOCTYPE html>
<html lang="utf-8">

<head>
    <meta charset="utf-8">
    <title>内部式引入CSS样式表</title>
    <style>
        p {
            text-align: center;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
        }

        h2 {
            color: aquamarine;
            text-align: center;
        }
    </style>
</head>

<body>
    <h2>内部式CSS样式表，三个h2标签样式相同，只需写一次</h2>
    <h2>内部式CSS样式表，三个h2标签样式相同，只需写一次</h2>
    <h2>内部式CSS样式表，三个h2标签样式相同，只需写一次</h2>
    <p>使用style标记可定义内嵌式CSS样式表，style一般位于head中，title之后。</p>
    <p>使用style标记可定义内嵌式CSS样式表，style一般位于head中，title之后。</p>
</body>

</html>
