<!DOCTYPE html>
<html lang="utf-8">

<head>
    <meta charset="utf-8">
    <title>通配符选择器</title>
    <style>
        * {
            color: #F00;
            text-align: center;
            background-color: grey;
        }

        h1 {
            color: green;
        }

        .bold {
            font-weight: 900;
        }

        #font {
            font-family: "隶书";
            font-size: 30px;
        }
    </style>
</head>

<body>
    <h1>春晓</h1>
    <p class="bold">唐 孟浩然</p>
    <p id="font">春眠不觉晓，处处闻啼鸟。</p>
    <p>夜来风雨声，花落知多少。</p>
</body>

</html>
