<!DOCTYPE html>
<html lang="utf-8">

<head>
    <meta charset="utf-8">
    <title>标签选择器</title>
    <style>
        div {
            width: 700px;
            background-color: rgb(240, 157, 230);
            margin: auto;
            text-align: center;
            color: #0F0;
            font-family: "黑体";
            font-size: 24px;
        }

        strong {
            color: #00F;
        }

        h1,
        h2 {
            text-align: center;
        }
    </style>
</head>

<body>
    <div>
        <h1>唐诗宋词-人生自有诗意</h1>
        <h2>绝句·古木阴中系短篷</h2>
        <strong><em>[宋]</em> 志南</strong>
        <p>古木阴中系短篷，杖藜扶我过桥东。</p>
        <p>沾衣欲湿杏花雨，吹面不寒杨柳风。</p>
    </div>
</body>

</html>
