<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>字体风格font-style</title>
<style>
	.one{font-style:normal;}
	.two{font-style:italic;}
	.three{font-style:oblique;}
	p{font-size: 30px;}
</style>
</head>
<body>
	<p>黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="one">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="two">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="three">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
</body>
</html>
