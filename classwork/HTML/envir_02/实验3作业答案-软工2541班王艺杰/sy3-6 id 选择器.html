<!DOCTYPE html>
<html lang="utf-8">

<head>
    <meta charset="utf-8">
    <title>id选择器</title>
    <style>
        #bold {
            font-weight: 900;
        }

        #font30 {
            font-size: 30px;
        }

        #font24 {
            font-size: 24px;
        }

        #red {
            color: red;
        }
    </style>
</head>

<body>
    <p id="bold">段落1：id="bold"，设置粗体文字。</p>
    <p id="font30">段落2：id="font30"，设置字号30px。</p>
    <p id="font24">段落3：id单独使用，设置字号24px。</p>
</body>

</html>
