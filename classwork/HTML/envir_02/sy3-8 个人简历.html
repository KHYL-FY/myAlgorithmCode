<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>个人简历</title>
    <style>
        table {
            width: 800px;
            height: 550px;
            border: solid 3px #000033;
            border-collapse: collapse;
            text-align: center;
            margin: 10px auto;
        }

        caption {
            font-size: 24px;
            padding: 10px;
        }

        td {
            border: solid 2px;
        }

        #pic {
            width: 200px;
        }

        .tdbgc {
            background-color: #ccc;
        }
    </style>
</head>

<body>
    <table>
        <caption>个人简历</caption>
        <tr>
            <td class="tdbgc">姓名</td>
            <td>张三丰</td>
            <td class="tdbgc">性别</td>
            <td>男</td>
            <td id="pic" rowspan="5">
                <img src="./images/boy.jpg" width="180" alt="照片">
            </td>
        </tr>
        <tr>
            <td class="tdbgc">民族</td>
            <td>汉</td>
            <td class="tdbgc">籍贯</td>
            <td>河南洛阳</td>
        </tr>
        <tr>
            <td class="tdbgc">出生日期</td>
            <td>2000-3-26</td>
            <td class="tdbgc">婚姻状况</td>
            <td>否</td>
        </tr>
        <tr>
            <td class="tdbgc">学历</td>
            <td>本科</td>
            <td class="tdbgc">体重身高</td>
            <td>173CM、70KG</td>
        </tr>
        <tr>
            <td class="tdbgc">专业</td>
            <td>计算机应用</td>
            <td class="tdbgc">健康状况</td>
            <td>良好</td>
        </tr>
        <tr>
            <td class="tdbgc">求职意向</td>
            <td colspan="3">计算机教育培训机构、软件公司</td>
            <td class="tdbgc">邮编</td>
            <td>471003</td>
        </tr>
        <tr>
            <td class="tdbgc">联系电话</td>
            <td>13836781234</td>
            <td class="tdbgc">邮箱</td>
            <td colspan="2">111111111@qq.com</td>
        </tr>
        <tr>
            <td class="tdbgc">语言能力</td>
            <td colspan="4">普通话：标准 英语：熟练</td>
        </tr>
        <tr>
            <td class="tdbgc">主修课程</td>
            <td colspan="4">C、C++、C#、操作系统、数据结构、数据库</td>
        </tr>
        <tr>
            <td class="tdbgc">个人技能</td>
            <td colspan="4">
                1. 熟悉客户端与服务器端脚本编写<br>
                2. 熟悉手机app开发
            </td>
        </tr>
    </table>
</body>

</html>
