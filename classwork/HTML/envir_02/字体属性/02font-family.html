<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>设置字体</title>
<style>
	p{font-size: 30px;}
	.one{font-family:宋体;}
	.two{font-family:楷体;}
	.three{font-family:毛体,隶书,微软雅黑,华文行楷;}
</style>
</head>

<body>
	<p>黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="one">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="two">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<p class="three">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
</body>
</html>
