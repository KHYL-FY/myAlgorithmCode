<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>字体大小font-size</title>
<style>
	.one{font-size:16px;}
	.two{font-size: 6px;}    /*em是父元素字体的倍数*/
	.three{font-size:200%;}
	html{font-size:48px;}
	body{font-size: 50%;}
	div{font-size: 50%;}    /*属性值为百分比，是父元素该属性的百分比*/
</style>
</head>
<body>
	<p>home黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	<div>
		<p class="one">student黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
		<p class="two">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
	</div>
	<p class="three">黑夜给了我黑色的眼睛，我却用它去寻找光明。</p>
</body>
</html>
