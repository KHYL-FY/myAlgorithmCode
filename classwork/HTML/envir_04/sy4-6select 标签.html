<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>select控件</title>
</head>

<body>
    <form action="#" method="get">
        所在地区（单选）：<br />
        <select name="select1">
            <option>-请选择-</option>
            <option>北京</option>
            <option>上海</option>
            <option selected>广州</option>
            <option>武汉</option>
            <option>成都</option>
        </select><br /><br />

        特长（单选）：<br />
        <select name="select2">
            <option>唱歌</option>
            <option selected>画画</option>
            <option>跳舞</option>
        </select><br /><br />

        爱好（多选）：<br />
        <select multiple="multiple" size="4" name="select3">
            <option selected>写代码</option>
            <option>读书</option>
            <option>旅行</option>
            <option selected>听音乐</option>
            <option>踢球</option>
        </select><br /><br />

        <input type="submit" value="提交" />
    </form>
</body>

</html>
