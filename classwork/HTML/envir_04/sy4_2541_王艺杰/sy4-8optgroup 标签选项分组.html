<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>optgroup选项分组</title>
</head>

<body>
    <form action="#" method="get">
        城区：<br />
        <select name="select1">
            <optgroup label="北京">
                <option>西城区</option>
                <option>东城区</option>
                <option>朝阳区</option>
                <option>海淀区</option>
            </optgroup>
            <optgroup label="上海">
                <option>浦东新区</option>
                <option>徐汇区</option>
                <option>虹口区</option>
            </optgroup>
        </select>
        <br /><br />
        <input type="submit" value="提交">
    </form>
</body>

</html>
