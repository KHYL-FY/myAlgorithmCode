<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>input常用type类型</title>
</head>

<body>
    <form id="form1" action="#" method="get">
        用户名：<input type="text" name="username" maxlength="10" size="30" /><br />
        密码：<input type="password" name="pwd" maxlength="16" size="20" /><br />
        性别：
        <input type="radio" name="gender" value="男" />男
        <input type="radio" name="gender" value="女" />女<br />
        爱好：
        <input type="checkbox" name="hobby" value="游泳" />游泳
        <input type="checkbox" name="hobby" value="跑步" />跑步
        <input type="checkbox" name="hobby" value="看书" />看书<br />
        上传文件：<input type="file" name="myfile" /><br />
        <input type="submit" value="提交" />
        <input type="reset" value="重置" />
        <input type="button" value="普通按钮" /><br />
        <input type="image" src="images/login.gif" value="图片按钮" />
    </form>
    <!-- 外部input绑定form -->
    <input type="text" name="last_name" form="form1" />
</body>

</html>
