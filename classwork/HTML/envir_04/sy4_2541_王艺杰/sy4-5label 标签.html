<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>label깃푯</title>
</head>

<body>
    灌곬땍label：<br />
    켕：<input type="radio" name="sex" />
    큽：<input type="radio" name="sex" /><br /><br />

    綠곬땍label：<br />
    <label for="male">켕</label>
    <input type="radio" name="sex" id="male" />
    <label for="female">큽</label>
    <input type="radio" name="sex" id="female" />
</body>

</html>
