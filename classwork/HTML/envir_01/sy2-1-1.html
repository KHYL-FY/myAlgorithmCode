<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li{
            list-style: none;
        }
    </style>
</head>

<body>
    <ul> <!--圆点 -->
        <li>一季度</li>
        <li>二季度</li>
        <li>三季度</li>
        <li>四季度</li>
    </ul>
    <ul type="disc">
        <li>一季度</li>
        <li>二季度</li>
        <li>三季度</li>
        <li>四季度</li>
    </ul>
    <ul type="square">
        <li>一季度</li>
        <li>二季度</li>
        <li>三季度</li>
        <li>四季度</li>
    </ul>
    <ul type="circle">
        <li>一季度</li>
        <li>二季度</li>
        <li>三季度</li>
        <li>四季度</li>
    </ul>
    <ul type="none">
        <li>一季度</li>
        <li>二季度</li>
        <li>三季度</li>
        <li>四季度</li>
    </ul>
</body>

</html>
