<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>在HTML5中嵌入音频</title>
</head>
 
<body>
    <!-- Internet Explorer 8 以及更早的版本不支持  标签。 -->
    <!-- 可以在开始标签和结束标签之间放置文本内容，这样老的浏览器就可以显示出不支持该标签的信息。 -->
    <!-- 标签之间的文本只会在不支持  元素的浏览器中显示 -->
    <audio src="music/1.mp3" controls="controls" autoplay loop>浏览器不支持audio标签
        <!-- controls属性的作用，在页面上显示播放控制器 -->
        <!-- autoplay属性的作用，页面加载完成后，自动播放音乐，新版浏览器大多自动禁止此功能，如goole浏览器 -->
        <!-- loop属性的作用，在音频播放完毕之后自动重播 -->
</body>

</html>
