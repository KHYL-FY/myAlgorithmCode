<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ol元素的使用</title>
    <style>
        li{
            list-style: "a";
        }
    </style>
</head>
<body>
    <body>
        <ol> <!--默认为阿拉伯数字编号-->
            <li>苹果</li>
            <li>香蕉</li>
            <li>柠檬</li>
            <li>桔子</li>
        </ol>
        <ol start="2"> <!--可以用start属性指定编号起始值-->
            <li>苹果</li>
            <li>香蕉</li>
            <li>柠檬</li>
            <li>桔子</li>
        </ol>
        <h4> 字母列表:  </h4>
            <ol type="A"> <!--通过type属性指定编号为其它类型-->
                <li>苹果</li>
                <li>香蕉</li>
                <li>柠檬</li>
                <li>桔子</li>
            </ol>
            <h4>小写字母列表: </h4>
                <ol type="a">
                    <li>苹果</li>
                    <li>香蕉</li>
                    <li>柠檬</li>
                    <li>桔子</li>
                </ol>
                <h4> 罗马字母列表：</h4>
                    <ol type="I">
                        <li>苹果</li>
                        <li>香蕉</li>
                        <li>柠檬</li>
                        <li>桔子</li>
                    </ol>
                    <h4>小写罗马字母列表：</h4>
                        <ol type="i">
                            <li>苹果</li>
                            <li>香蕉</li>
                            <li>柠檬</li>
                            <li>桔子</li>
                        </ol>
    </body>
</body>
</html>
