<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>表格标签</title>
</head>

<body>
    <!-- 表格基础标签 table、tr、td -->
    <!-- 表格的标题标签caption -->
    <!--表格的表头标签th，该标记中的内容默认加粗且居中-->
    <!--1. thead标记 -->
    <!--2. tbody标记 -->
    <!--3. tfoot标记 -->
    <!-- <table border="1" width="600" height="300" cellspacing="0" cellpadding="10"> -->
    <!-- <table border="1" width="600" height="300"> -->
    <table>
        <!-- 表格标题  -->
        <caption>
            <h2>课程表</h2>
        </caption>
        <thead>
            <tr>
                <th>节次</th>
                <th>星期一</th>
                <th>星期二</th>
                <th>星期三</th>
                <th>星期四</th>
                <th>星期五</th>
                <th>星期六</th>
                <th>星期日</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1-2节</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>物理</td>
                <td>体育</td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>3-4节</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>物理</td>
                <td>体育</td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>5-6节</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>物理</td>
                <td>体育</td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>7-8节</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>物理</td>
                <td>体育</td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>9-10节</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>物理</td>
                <td>体育</td>
                <td></td>
                <td></td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>底部</td>
                <td>底部</td>
                <td>底部</td>
                <td>底部</td>
                <td>底部</td>
                <td>底部</td>
                <td></td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
