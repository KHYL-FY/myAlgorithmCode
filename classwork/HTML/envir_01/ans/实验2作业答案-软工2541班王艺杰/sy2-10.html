<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>在HTML5中嵌入视频</title>
</head>

<body>
    <!-- nternet Explorer 8 以及更早的版本不支持 <video> 标签 -->
    <!-- 可以在开始标签和结束标签之间放置文本内容，这样老的浏览器就可以显示出不支持该标签的信息。 -->
    <video src="video/pian.mp4" controls autoplay loop>浏览器不支持video标签</video>
</body>

</html>
