<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>盒子宽度和高度</title>
    <style>
        .father {
            width: 200px;
            height: 200px;
            background: #c7b3b3;
            border: 1px solid #00f;
        }

        .child01 {
            width: 100px;
            height: 50px;
            background-color: pink;
            border: 1px solid #000;
            margin-bottom: 10px;
        }

        .child02 {
            width: 50%;
            height: 50px;
            background-color: rgb(135, 235, 143);
            border: 1px solid #000;
        }
    </style>
</head>

<body>
    <div class="father">
        <div class="child01">宽度为像素</div>
        <div class="child02">宽度为百分比</div>
    </div>
</body>

</html>
