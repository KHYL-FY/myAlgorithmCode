<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>表格边框合并</title>
    <style>
        table,
        td,
        th {
            border: 2px solid black;
        }

        table {
            width: 200px;
            border-collapse: collapse;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>姓名</th>
            <th>年龄</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>21</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>20</td>
        </tr>
    </table>
</body>

</html>
