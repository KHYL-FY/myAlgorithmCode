<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>边框画三角形</title>
    <style>
        .icon {
            width: 0;
            height: 0;
            border-width: 40px;
            margin: 10px;
            border-style: solid;
            border-color: red green orange blue;
        }

        .two {
            border-radius: 50%;
        }

        .three {
            border-color: red transparent blue transparent;
        }
    </style>
</head>

<body>
    <div class="icon"></div>
    <div class="icon two"></div>
    <div class="icon three"></div>
</body>

</html>
