<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>ICON</title>
    <style>
        div {
            width: 50px;
            height: 50px;
            border-style: double;
            border-width: 20px;
            border-color: #cF0 #cF0 #9F0 #9F0;
            margin-bottom: 20px;
        }

        .box2 {
            border-radius: 50%;
        }

        .box3 {
            border-radius: 50% 50% 100% 100%;
        }

        .box4 {
            border-radius: 50% 0% 50% 50%;
        }

        .box5 {
            border-radius: 50% 50% 0% 100%;
        }

        .box6 {
            border-radius: 50% 0% 100% 0%;
        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
</body>

</html>
