<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>弹性盒子效果展示</title>
    <style>
        .container {
            display: flex;
            border: 1px solid #000;
            background-color: rgb(218, 208, 208);
        }

        .container div {
            width: 50px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #000;
            box-sizing: border-box;
            background-color: rgb(234, 172, 172);
        }
    </style>
</head>

<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
</body>

</html>
