<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>flex-shrink</title>
    <style>
        .container {
            width: 800px;
            height: 200px;
            border: 1px solid #000;
            background-color: rgb(218, 208, 208);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .container div {
            width: 100px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #000;
            box-sizing: border-box;
            background-color: rgb(234, 172, 172);
            flex-shrink: 1;
        }

        .container div:nth-child(3) {
            background-color: skyblue;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
    </div>
</body>

</html>
