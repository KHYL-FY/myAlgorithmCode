<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>块元素div</title>
    <style>
        div {
            width: 600px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            background-color: rgb(140, 231, 145);
            padding: 5px;
            border: 1px solid #000;
            margin: 2px;
        }
    </style>
</head>

<body>
    <div>1.我是div，我是典型的块元素，相当于一个容器</div>
    <div>2.大多数的标签都可以嵌套在div内，还可以嵌套多层</div>
    <div>3.div可以将网页分割为独立的部分，以实现网页的规划和布局</div>
    <div>4.div可以替代大多数的块级文本标记</div>
</body>

</html>
