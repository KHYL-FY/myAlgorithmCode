<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>块元素</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        li {
            list-style: none;
        }

        h1,
        li {
            width: 600px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            background-color: skyblue;
            padding: 5px;
            border: 1px solid #000;
            margin: 2px;
        }
    </style>
</head>

<body>
    <h1>块元素具有以下属性</h1>
    <ul>
        <li>1.块元素比较霸道，自己独占一行</li>
        <li>2.可以对其设置宽度、高度、内边距、外边距、对齐等属性</li>
        <li>3.宽度默认是容器(父元素)的宽度</li>
        <li>4.是一个容器盒子，里面可以放行内元素、块级元素</li>
        <li>5.常用的块元素h1~h6、div标签、p标签、ul与ol、table等</li>
    </ul>
</body>

</html>
