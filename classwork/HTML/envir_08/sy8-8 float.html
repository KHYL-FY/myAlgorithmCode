<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>浮动</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .class01 {
            color: #f00;
            font-weight: bolder;
            font-size: 20px;
        }

        li {
            float: left;
        }
    </style>
</head>

<body>
    <ul>
        <li>1.浮动元素会脱离标准流</li>
        <li>2.浮动元素会有行内块元素的特性。</li>
        <li>3.浮动元素会一行内显示并且顶部对齐</li>
        <li>4.如果一行显示不下，自动换行</li>
        <li>5.常用于<span class="class01">页面布局如导航栏</span></li>
    </ul>
</body>

</html>
