<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>行内元素span</title>
    <style>
        .kaixue {
            color: blue;
            font-size: 20px;
            font-weight: bolder;
        }

        .softcollege {
            padding: 20px;
            border: 1px solid #000;
            margin: 10px;
            color: #f00;
        }
    </style>
</head>

<body>
    <span>span标签：行内元素</span><br>
    <span>只能包含文本和各种行内标记</span><br>
    <span>不可以设置width和height</span><br>
    <span>可以设置边框、内边距和外边距</span><br>
    <span>用于定义网页中某些特殊显示的文本，配合class使用</span><br>
    <p><span class="kaixue">我们终于开学啦!</span></p>
    <p>来到了心中向往已久的<span class="softcollege">河大软件学院</span>，开始了改变命运的征途。</p>
</body>

</html>
