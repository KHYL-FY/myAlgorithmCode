<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>元素的显示与隐藏</title>
    <style>
        div {
            width: 300px;
            height: 100px;
            background-color: skyblue;
            border: 1px solid #f00;
            margin: 10px auto;
        }

        .box2 {
            display: none;
        }

        .box3 {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="box1">第1个盒子</div>
    <div class="box2">第2个盒子</div>
    <div class="box3">第3个盒子：深化科研项目管理改革迈出新步伐！</div>
</body>

</html>
