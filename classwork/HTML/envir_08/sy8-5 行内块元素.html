<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>行内块元素</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        input,
        img {
            width: 150px;
            height: 30px;
            padding: 10px;
            margin: 5px;
            border: 1px solid #000;
        }
    </style>
</head>

<body>
    <h1>行内块元素具有以下属性</h1>
    <ul>
        <li>1.一行可以显示多个(行内元素特点)</li>
        <li>2.和相邻行内元素(行内块)在一行上，之间有空白缝隙</li>
        <li>3.默认宽度是它本身内容的宽度(行内元素特点)</li>
        <li>4.高度、宽度和行高、内外边距都可以控制(块级元素特点)</li>
        <li>5.常用的行内块元素img、input、td等</li>
    </ul>
    <input type="text">
    <input type="text">
    <img src="./images/5.jpg" alt="">
</body>

</html>
