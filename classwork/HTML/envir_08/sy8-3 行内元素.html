<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>行内元素</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        span,
        strong,
        a {
            background-color: hotpink;
        }
    </style>
</head>

<body>
    <h1>行内元素具有以下属性</h1>
    <ul>
        <li>1.不占有独立的区域，相邻元素在一行上，一行可以显示多个</li>
        <li>2.不可以设置宽度、高度、对齐等属性，仅靠自身字体大小支撑</li>
        <li>3.默认宽度就是它内容本身的宽度，显示不完自动换行</li>
        <li>4.行内元素只能容纳文本或者其他行内元素</li>
        <li>5.常用的行内元素为标签a、span、strong等</li>
    </ul>
    <span>河南科技大学</span><strong>欢迎你!</strong>
    <span>软件学院</span><strong>欢迎你!</strong>
    <a href="https://www.haust.edu.cn/">河南科技大学</a>
    <a href="https://www.baidu.com/">百度</a>
</body>

</html>
