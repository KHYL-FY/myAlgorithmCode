<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>文本格式化标记</title>
</head>

<body>
    <p>我是正常显示的文本</p>
    <p>我是使用b标记定义的<b>加粗文本</b></p>
    <p>我是使用strong标记定义的<strong>强调文本</strong></p>
    <p>我是使用i标记定义的<i>倾斜文本</i></p>
    <p>我是使用em标记定义的<em>强调文本</em></p>
    <p>我是使用s标记定义的<s>删除线文本</s></p>
    <p>我是使用del标记定义的<del>删除线文本</del></p>
    <p>我是使用u标记定义的<u>下划线文本</u></p>
    <p>我是使用ins标记定义的<ins>下划线文本</ins></p>
    <p>一打有<del>二十</del><ins>十二</ins>件。</p>
    <p>我是<ruby>拼音<rt>pinyin</rt></ruby>注释标记</p>
</body>

</html>
