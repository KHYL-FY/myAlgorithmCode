<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>图像标记img的alt属性</title>
</head>

<body>
    <!-- img标签的常用属性：alt、align、title -->
    <!-- 图片加载失败显示alt -->
    <img src="logo.gif" alt="传智播客logo图标" align="left" />
    <!-- 鼠标悬浮显示title -->
    <img src="images/朝阳楼.jpg" title="福建土楼" />
    <img src="../bb/b.jpg" title="html5" align="right" />
</body>

</html>
