<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>两面翻转的图片</title>
    <style>
    	div{
    		width:224px;
    		margin:100px auto; 
    		height:224px;
    		position: relative;
    		perspective: 1000px;
    	}
		div img{ 
			position: absolute;
			top:0;
			left:0;
			transition:all 1s;
		}
		div img:first-child{
			z-index:1;
			backface-visibility:hidden;
		}
		div:hover img{ 
			transform: rotateY(180deg);
		}
    </style>
</head>
<body>
    <div>
        <img src="images/pk1.png" alt=""/>
        <img src="images/pk3.png" alt=""/>
    </div>
</body>
</html>
