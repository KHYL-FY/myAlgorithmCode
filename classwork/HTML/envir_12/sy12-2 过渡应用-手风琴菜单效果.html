<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>过渡应用-手风琴菜单</title>
    <style>
    	* {
    		padding: 0;
    		margin:0;
    	}
		.menu{ 
			width: 200px;
			height:auto;
			margin:100px auto;
		}
		.item{
			width:100%;
			height:auto;
		}
		.item>h3{
			height:40px; 
			line-height:40px;
			background-color: #8DC5D3;
			color: orange;
			border-bottom: 2px solid #ccc;
			padding-left:10px;
		}
		.item>.itemBox{
			width:100%;
			height: 0px;
			overflow:hidden;
			transition: height 1s;
		}
		.item>.itemBox>ul{
			list-style:none;
			background-color: #eaffb6;
			padding:10px;
		}
		.item:hover>.itemBox{
			height:110px;
		}
    </style>
</head>
<body>
<div class="menu">
    <div class="item">
        <h3>市内新闻</h3>
        <div class="itemBox">
            <ul>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
            </ul>
        </div>
    </div>
    <div class="item">
        <h3>省内新闻</h3>
        <div class="itemBox">
            <ul>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
            </ul>
        </div>
    </div>
    <div class="item">
        <h3>国内新闻</h3>
        <div class="itemBox">
            <ul>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
            </ul>
        </div>
    </div>
    <div class="item">
        <h3>国际新闻</h3>
        <div class="itemBox">
            <ul>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
                <li>深圳超市肉菜档遭抢</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
