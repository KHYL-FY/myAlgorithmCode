<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>开门大吉效果</title>
    <style>
    	.box{ 
    		width:450px;
    		height:300px;
    		border:1px solid #000;
    		margin:100px auto;
    		perspective:1000px;
    		background: url(images/1.jpg) no-repeat; 
    		position: relative;
    	}
		.door-l, .door-r{ 
			position: absolute;
			top:0;
			width:50%;
			height:100%;
			background-color: pink;
			transition:all 1s;
			background:url(images/bg.png);
		}
		.door-l{
			left:0;
			border-right:1px solid #000;
			transform-origin:left;
		}
		.door-r{
			right:0;
			border-left:1px solid #000;
			transform-origin:right;
		}
		.door-l::before,.door-r::before{
			content:''; 
			position: absolute;
			top:50%;
			width:20px; 
			height:20px; 
			border:1px solid #000; 
			border-radius:50%;
			transform:translateY(-50%);
		}
		.door-l::before {
			right:5px;
		}
		.door-r::before {
			left:5px;
		}
		.box:hover .door-l { 
			transform: rotateY(-130deg);
		}
		.box:hover .door-r{ 
			transform: rotateY(130deg);
		}
    </style>
</head>
<body>
    <div class="box">
        <div class="door-l"></div>
        <div class="door-r"></div>
    </div>
</body>
</html>
